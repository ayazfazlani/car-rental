name: Luxus car 

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.20.0' # specify your Node.js version

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build the project
        run: npm run build

      - name: Create tarball of build artifacts
        run: |
          tar czf build.tar.gz .next package.json public next.config.js 

      - name: Deploy to Comgari Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{secrets.SSH_IP}}
          username: ${{secrets.SSH_USER}}
          key: ${{secrets.SSH_PRIVATE_KEY}}
          source: './build.tar.gz'
          rm: false
          target: '/var/www/luxuscarrental.com/'
          verbose: true
          debug: true

      - name: Executing the Migrate and other commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          timeout: 30m
          command_timeout: 30m
          host: ${{secrets.SSH_IP}}
          username: ${{secrets.SSH_USER}}
          key: ${{secrets.SSH_PRIVATE_KEY}}
          script: |
            cd /var/www/luxuscarrental.com/
            rm -rf .next/ node_modules/
            tar -xzf build.tar.gz
            npm install --legacy-peer-deps
            pm2 restart luxus-car-rental
